<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pulse AI — A professional AI chatbot powered by OpenAI GPT." />
  <title>Pulse AI · Smart Chat Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.38-1 1.73V7h3a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-8a3 3 0 0 1 3-3h3V5.73A2 2 0 0 1 10 4a2 2 0 0 1 2-2z"/>
            <circle cx="9.5" cy="13" r="1" fill="currentColor" stroke="none"/>
            <circle cx="14.5" cy="13" r="1" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <span class="logo-name">Pulse <b>AI</b></span>
      </div>
      <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <button class="new-chat-btn" id="newChatBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New Chat
    </button>

    <p class="sidebar-label">Today</p>
    <ul class="chat-list" id="chatList" role="list"></ul>

    <div class="sidebar-bottom">
      <button class="theme-row" id="themeBtn" aria-label="Toggle theme">
        <svg id="themeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
        <span id="themeLabel">Dark mode</span>
        <div class="toggle-pill" id="togglePill">
          <div class="toggle-knob" id="toggleKnob"></div>
        </div>
      </button>
      <div class="server-status" id="serverStatus">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusLabel">Checking…</span>
      </div>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">

    <!-- Top bar -->
    <header class="topbar">
      <button class="topbar-btn" id="menuBtn" aria-label="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="topbar-center">
        <div class="topbar-avatar">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.38-1 1.73V7h3a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-8a3 3 0 0 1 3-3h3V5.73A2 2 0 0 1 10 4a2 2 0 0 1 2-2z"/>
            <circle cx="9.5" cy="13" r="1" fill="currentColor" stroke="none"/>
            <circle cx="14.5" cy="13" r="1" fill="currentColor" stroke="none"/>
          </svg>
          <span class="topbar-pulse"></span>
        </div>
        <div>
          <p class="topbar-name">Pulse AI</p>
          <p class="topbar-sub" id="topbarSub">
            <span class="live-dot"></span>
            <span id="topbarStatus">Connected</span>
          </p>
        </div>
      </div>
      <button class="topbar-btn" id="clearBtn" aria-label="Clear chat" title="Clear chat">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
        </svg>
      </button>
    </header>

    <!-- Chat window -->
    <section class="chat-window" id="chatWindow" role="log" aria-live="polite" aria-label="Chat messages">

      <!-- Empty / welcome state -->
      <div class="empty-state" id="emptyState">
        <div class="empty-orb">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.38-1 1.73V7h3a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-8a3 3 0 0 1 3-3h3V5.73A2 2 0 0 1 10 4a2 2 0 0 1 2-2z"/>
            <circle cx="9.5" cy="13" r="1" fill="currentColor" stroke="none"/>
            <circle cx="14.5" cy="13" r="1" fill="currentColor" stroke="none"/>
            <path d="M9.5 17c.7.5 1.3.7 2.5.7s1.8-.2 2.5-.7"/>
          </svg>
        </div>
        <h1>How can I help you?</h1>
        <p>Ask me anything — I'm powered by GPT and ready to give accurate, human-like answers.</p>
        <div class="suggestions" id="suggestions">
          <button class="sugg-btn" data-q="Explain how the internet works step by step">🌐 How the internet works</button>
          <button class="sugg-btn" data-q="Write a Python function to find all prime numbers up to 100">🐍 Python prime numbers</button>
          <button class="sugg-btn" data-q="What caused World War 1? Explain the MAIN factors">📜 Causes of World War 1</button>
          <button class="sugg-btn" data-q="Explain machine learning vs deep learning with examples">🤖 ML vs Deep Learning</button>
          <button class="sugg-btn" data-q="What is quantum computing and how does it work?">⚛️ Quantum computing</button>
          <button class="sugg-btn" data-q="Give me 5 tips to improve my productivity">⚡ Productivity tips</button>
        </div>
      </div>

      <!-- Messages injected here -->
      <div class="msg-feed" id="msgFeed"></div>

      <!-- Typing indicator -->
      <div class="typing-row hidden" id="typingRow">
        <div class="t-ava">P</div>
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>

    </section>

    <!-- Input bar -->
    <footer class="input-area">
      <div class="input-box" id="inputBox">
        <textarea
          id="msgInput"
          class="msg-input"
          placeholder="Message Pulse AI…"
          rows="1"
          aria-label="Your message"
          autocomplete="off"
          spellcheck="true"
        ></textarea>
        <button class="send-btn" id="sendBtn" aria-label="Send message">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
            <polygon points="22 2 15 22 11 13 2 9 22 2" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <p class="disclaimer">Pulse AI is powered by OpenAI GPT. Verify important information.</p>
    </footer>

  </main>
</div>

<!-- Sidebar overlay for mobile -->
<div class="overlay hidden" id="overlay"></div>

<script src="script.js"></script>
</body>
</html>
